name: Publish

on:
  release:
    types: [published]
  # Manual re-trigger for the R-only path. The crates.io + PyPI jobs are
  # skipped when this fires; we only re-run the R tarball build, R CMD
  # check matrix, and upload to an existing release. Use this when the R
  # build needs a fix after crates/PyPI have already shipped.
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload the rebuilt R tarball to (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── crates.io ──────────────────────────────────────────────────────────
  # Only runs on a real `release: published` event. Re-running via
  # workflow_dispatch would error because the version is already published.
  publish-crates:
    name: Publish to crates.io
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish gsem-matrix
        run: cargo publish -p gsem-matrix
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish gsem-ldsc
        run: cargo publish -p gsem-ldsc
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gsem-sem
        run: cargo publish -p gsem-sem
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish gsem
        run: cargo publish -p gsem
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

  # ── PyPI (maturin cross-platform wheels) ───────────────────────────────
  # All PyPI jobs only run on `release: published`; skipped when
  # re-triggered manually via workflow_dispatch.
  build-python-wheels:
    name: Build Python wheels (${{ matrix.os }})
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: universal2-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          working-directory: bindings/python
          target: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: bindings/python/dist

  build-python-sdist:
    name: Build Python sdist
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: bindings/python/dist

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ── CRAN (R source tarball + binary builds) ────────────────────────────
  # R build is gated on publish-crates: bindings/r/src/rust/Cargo.toml uses
  # crates.io versions (not local paths), so the internal crates must be on
  # crates.io before `R CMD build` runs. On workflow_dispatch re-triggers,
  # publish-crates is skipped (crates are already on crates.io from the
  # original release run) — the `if` lets the R job proceed anyway.
  build-r-source:
    name: Build R source package
    needs: publish-crates
    if: |
      always() &&
      (needs.publish-crates.result == 'success' || needs.publish-crates.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/r/src/rust
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: oldrel
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/r
          extra-packages: any::jsonlite
      - name: Build source tarball
        run: R CMD build bindings/r
      - uses: actions/upload-artifact@v4
        with:
          name: r-source
          path: gsemr_*.tar.gz

  check-r-package:
    name: R CMD check (${{ matrix.os }})
    needs: build-r-source
    # Explicit `if` needed so GitHub doesn't apply the implicit
    # `success()` gate, which cascades skips through the whole needs
    # chain (publish-crates is skipped on workflow_dispatch and the
    # transitive `success()` evaluates to false).
    if: always() && needs.build-r-source.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      # On Windows, R uses Rtools (MinGW/gcc), so the Rust staticlib must
      # be built with the x86_64-pc-windows-gnu target, not the MSVC
      # default. Install that target explicitly.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'windows-latest' && 'x86_64-pc-windows-gnu' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/r/src/rust
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: oldrel
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/r
          extra-packages: any::jsonlite, any::rcmdcheck
      - uses: actions/download-artifact@v4
        with:
          name: r-source
      - name: R CMD check
        run: |
          rcmdcheck::rcmdcheck(
            path = Sys.glob("gsemr_*.tar.gz"),
            args = c("--no-manual", "--as-cran"),
            error_on = "error"
          )
        shell: Rscript {0}
        env:
          _R_CHECK_FORCE_SUGGESTS_: false

      # After R CMD check passes, build a binary package so users on
      # this OS can `install.packages(..., repos = NULL)` without
      # needing a Rust toolchain. Binary extensions differ by platform:
      #   ubuntu  -> gsemr_<ver>_R_x86_64-pc-linux-gnu.tar.gz
      #   macOS   -> gsemr_<ver>.tgz
      #   Windows -> gsemr_<ver>.zip
      - name: Build R binary package
        shell: bash
        run: |
          set -e
          src_tarball=$(ls gsemr_*.tar.gz | head -n1)
          echo "Building binary from $src_tarball"
          R CMD INSTALL --build "$src_tarball"
          ls -la gsemr_*

      # Rename Linux binary to an unambiguous, user-friendly filename.
      # R produces `gsemr_<ver>_R_x86_64-pc-linux-gnu.tar.gz` which
      # collides with the source tarball extension. Rename to
      # `gsemr_<ver>_linux.tar.gz` so download-artifact later can pair
      # source vs binary by filename without ambiguity.
      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          bin=$(ls gsemr_*_R_*-linux-gnu.tar.gz 2>/dev/null || true)
          if [ -n "$bin" ]; then
            ver=$(echo "$bin" | sed -E 's/^gsemr_([^_]+)_.*/\1/')
            mv "$bin" "gsemr_${ver}_linux.tar.gz"
            echo "Renamed $bin -> gsemr_${ver}_linux.tar.gz"
          fi

      - name: Upload R binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: r-binary-${{ matrix.os }}
          path: |
            gsemr_*_linux.tar.gz
            gsemr_*.tgz
            gsemr_*.zip
          if-no-files-found: error

  upload-r-to-release:
    name: Attach R tarball to GitHub release
    needs: [build-r-source, check-r-package]
    # Same workaround as check-r-package: force a ternary condition so
    # the transitive skip cascade doesn't take us out.
    if: |
      always() &&
      needs.build-r-source.result == 'success' &&
      needs.check-r-package.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Source tarball (fallback install path — requires Rust toolchain).
      - name: Download source tarball
        uses: actions/download-artifact@v4
        with:
          name: r-source
          path: release-assets
      # Pre-built binary packages from each check-r-package matrix run
      # (primary install path — no Rust toolchain needed). Pattern
      # matches `r-binary-ubuntu-latest`, `r-binary-macos-latest`,
      # `r-binary-windows-latest`.
      - name: Download binary packages
        uses: actions/download-artifact@v4
        with:
          pattern: r-binary-*
          merge-multiple: true
          path: release-assets
      - name: List release assets
        run: ls -la release-assets/
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/gsemr_*.tar.gz
            release-assets/gsemr_*.tgz
            release-assets/gsemr_*.zip
          # When triggered manually, upload to the tag the user specified.
          # When triggered by `release: published`, tag_name is ignored and
          # the action uses the release that fired the event.
          tag_name: ${{ github.event.inputs.release_tag }}
